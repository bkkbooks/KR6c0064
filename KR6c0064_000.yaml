front:
  text: 林子自書金剛統論卷端古人有言曰天地設位聖人成能何謂也林子曰無始氏然後有泰始氏泰始氏始為擘破洪濛而以其虗空中一點真陽以胎天生天而天開於子也胎地生地而地闢於丑也乃今正值天地之運午將過中也誰有能大發誓願以豫為數萬年真陽來復之計以再造天地之乾坤重立天地之性命者乎然非有古今之一大聖人不能為己由午而未而申而酉而戊而亥以漸收真陽而終之者此聖人之所以前天地而藏諸用豫之以成其能也卒成之終乃反其始而天之所以復開於子地之所以復闢於丑以漸還真陽而始之者此聖人之所以參天地而顯諸用贊之以成其能也由是觀之天地不能自始不得聖人之終則無以為始天地不能自終不得聖人之始則無以為終而其所以終而始之始而終之以來復萬古之真陽者斯其有功於天地也大矣然惟此一真陽也始於泰始氏而無所於始者無始氏也而天地人共之矣放而彌之而周流於六虗之外而無不足收而斂之而退藏於一人之身而非有餘其天地聖人之所以能相陰陽而迭終始者乎易曰原如反終故知死生之說夫豈惟人哉而天地且不能違矣故不知我之所以始所以終而曰我能再造我之乾坤重立我之性命者未也不知天地之所以始所以終而曰我能再造天地之乾坤重立天地之性命者未也龍江兆恩
